<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Tracking — ViceRide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f6f6f6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .track-nav {
            background: #000;
            padding: 0 3rem;
            height: 8.7vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }

        .track-nav h1 {
            font-weight: 900;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .track-nav-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .track-nav-right span {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Map container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #trackMap {
            width: 100%;
            height: 100%;
        }

        /* Status Card */
        .status-card {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
            padding: 1.75rem 2rem;
            width: 90%;
            max-width: 480px;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .status-badge.finding {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.assigned {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-badge.enroute {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.arrived {
            background: #ede9fe;
            color: #5b21b6;
        }

        .status-badge.inprogress {
            background: #000;
            color: #fff;
        }

        .status-badge.completed {
            background: #10b981;
            color: #fff;
        }

        .status-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 0.25rem;
            text-align: center;
        }

        .status-subtitle {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Driver info row */
        .driver-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-top: 1px solid #f0f0f0;
        }

        .driver-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .driver-details {
            flex: 1;
        }

        .driver-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #000;
        }

        .driver-vehicle {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2px;
        }

        .driver-rating {
            font-size: 0.85rem;
            font-weight: 600;
            color: #000;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Ride info */
        .ride-info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-top: 1px solid #f0f0f0;
        }

        .ride-info-item {
            text-align: center;
        }

        .ride-info-value {
            font-size: 1rem;
            font-weight: 700;
            color: #000;
        }

        .ride-info-label {
            font-size: 0.65rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Cancel / Complete  buttons */
        .action-btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .cancel-btn {
            background: #fff;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .cancel-btn:hover {
            background: #fef2f2;
        }

        .complete-btn {
            background: #10b981;
            color: #fff;
        }

        .complete-btn:hover {
            background: #059669;
        }

        .home-btn {
            background: #000;
            color: #fff;
        }

        .home-btn:hover {
            background: #222;
        }

        /* Progress dots */
        .progress-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.4s ease;
        }

        .progress-dot.active {
            background: #000;
        }

        .progress-dot.done {
            background: #10b981;
        }

        .progress-line {
            flex: 1;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .progress-line.done {
            background: #10b981;
        }

        .hidden-text {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="track-nav">
        <h1>ViceRide</h1>
        <div class="track-nav-right">
            <span id="trackWelcome"></span>
        </div>
    </nav>

    <!-- Map -->
    <div class="map-container">
        <div id="trackMap"></div>

        <!-- Status Card Overlay (Now a Bottom Sheet) -->
        <div class="bottom-sheet open" id="statusCard">
            <div class="sheet-handle"></div>

            <!-- Searching State -->
            <div id="searchingState">
                <div class="search-spinner"></div>
                <div class="status-title">Looking for nearby drivers...</div>
                <div class="status-subtitle">This usually takes less than a minute</div>
                <div id="actionBtnContainerSearch">
                    <button class="action-btn cancel-btn" id="cancelSearchBtn">Cancel Search</button>
                </div>
            </div>

            <!-- Driver Found / Accepted State -->
            <div id="driverState" style="display: none;">
                <div class="status-badge finding" id="statusBadge"
                    style="margin: 0 auto 1rem auto; display: block; width: fit-content;">Assigned</div>
                <div class="status-title" id="statusTitle">Driver is on the way</div>
                <div class="status-subtitle" id="statusSubtitle">Meet your driver at the pickup point</div>

                <div class="driver-row" id="driverRow">
                    <div class="driver-avatar" id="driverAvatar">?</div>
                    <div class="driver-details">
                        <div class="driver-name" id="driverName">—</div>
                        <div class="driver-vehicle" id="driverVehicle">—</div>
                    </div>
                    <div class="driver-rating" id="driverRating">⭐ —</div>
                    <a href="#" class="btn-call">📞</a>
                </div>

                <div class="ride-info-row" id="rideInfoRow">
                    <div class="ride-info-item">
                        <div class="ride-info-value" id="rideEta">—</div>
                        <div class="ride-info-label">ETA</div>
                    </div>
                    <div class="ride-info-item">
                        <div class="ride-info-value" id="rideDistance">—</div>
                        <div class="ride-info-label">Distance</div>
                    </div>
                    <div class="ride-info-item">
                        <div class="ride-info-value" id="rideFare">—</div>
                        <div class="ride-info-label">Fare</div>
                    </div>
                </div>

                <div id="actionBtnContainerDriver">
                    <button class="action-btn cancel-btn" id="cancelRideBtn">Cancel Ride</button>
                </div>
            </div>
        </div>
    </div>

    <span class="hidden-text" aria-hidden="true">UDAIY</span>

    <script src="ride-track.js"></script>
</body>

</html>

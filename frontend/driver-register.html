<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Apply - ViceRide</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--primary-black);
        }

        .card {
            border-top: 4px solid #fff;
            max-width: 500px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 class="landing-logo" style="margin-bottom: 2rem; color: var(--text-primary); font-size: 2.5rem;">ViceRide
            Pro
        </h1>
        <h2>Become a Driver</h2>
        <p>Register to start earning</p>

        <form id="driverRegisterForm">
            <!-- Account Info -->
            <div class="input-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" required placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="regPhone">Phone Number</label>
                <input type="tel" id="regPhone" required placeholder="Enter your phone number">
            </div>
            <div class="input-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required placeholder="Create a password">
            </div>

            <p id="registerMessage" class="message"></p>
            <button type="submit" class="btn btn-primary" id="registerBtn">Create Driver Account</button>
        </form>

        <form id="otpForm" style="display:none;">
            <h3>Verify Your Email</h3>
            <p style="font-size: 0.9rem; margin-bottom: 1rem; color: #a0a0a0;">An OTP has been sent to your email
                address.</p>
            <div class="input-group">
                <label for="otpInput">OTP Code</label>
                <input type="text" id="otpInput" required placeholder="Enter 6-digit OTP">
            </div>
            <p id="otpMessage" class="message error"></p>
            <button type="submit" class="btn btn-primary" id="otpBtn">Verify Email</button>
        </form>

        <p class="switch-form" id="switchFormText">Already a driver? <a href="driver-login.html">Login</a></p>
    </div>
    <script src="driver-auth.js"></script>
</body>

</html>

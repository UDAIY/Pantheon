<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="dashboard-bg">
    <div class="dashboard-container">
        <header class="dashboard-header card"
            style="background: rgba(244, 234, 225, 0.85); backdrop-filter: blur(10px);">
            <img src="logo.png" alt="The Pantheon" class="nav-logo">
            <h1 id="welcomeHeader">Loading...</h1>
            <h2 style="margin-top: 10px; font-weight: 500;">welcome to THE PANTHEON</h2>
            <button id="logoutBtn" class="btn btn-outline" style="margin-top: 1rem;">Logout</button>
        </header>
        <main class="dashboard-main">
            <div class="card dashboard-card" style="background: rgba(244, 234, 225, 0.9); backdrop-filter: blur(5px);">
                <h2>Your Information</h2>
                <div class="info-group">
                    <p><strong>Name:</strong> <span id="infoName"></span></p>
                    <p><strong>Email:</strong> <span id="infoEmail"></span></p>
                </div>
            </div>
        </main>
        <!-- hidden text -->
        <span class="hidden-text" aria-hidden="true" style="display:none;">UDAIY</span>
    </div>
    <script src="main.js"></script>
    <script>
        // Check if token exists, if not redirect to login
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }
        document.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>

</html>
